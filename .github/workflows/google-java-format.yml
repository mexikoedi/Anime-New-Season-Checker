name: Google Java Format

on:
  push:
    branches: [ main ]

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.2
      - name: Set up JDK 21
        uses: actions/setup-java@v5.2.0
        with:
          distribution: 'temurin'
          java-version: 21
          cache: 'gradle'
          server-id: github
          settings-path: ${{ github.workspace }}
      - uses: axel-op/googlejavaformat-action@v4
